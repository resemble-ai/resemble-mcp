      operationId: listKnowledgeItems
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, processing, ready, failed]
          description: Filter by status
        - name: source_type
          in: query
          schema:
            type: string
            enum: [document, url, text]
          description: Filter by source type
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Items per page
      responses:
        '200':
          description: List of knowledge items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        uuid:
                          type: string
                          format: uuid
                        title:
                          type: string
                        description:
                          type: string
                        source_type:
                          type: string
                          enum: [document, url, text]
                        status:
                          type: string
                          enum: [pending, processing, ready, failed]
                        error_message:
                          type: string
                          nullable: true
                        chunk_count:
                          type: integer
                          nullable: true
                        url:
                          type: string
                          nullable: true
                        document_url:
                          type: string
                          nullable: true
                        document_filename:
                          type: string
                          nullable: true
                        agent_count:
                          type: integer
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      per_page:
                        type: integer
                      total_count:
                        type: integer
                      total_pages:
                        type: integer

    post:
      tags:
        - Agent Knowledge Base
      summary: Create knowledge item
      description: Creates a new knowledge item and queues it for ingestion processing
      operationId: createKnowledgeItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
                - source_type
              properties:
                title:
                  type: string
                  maxLength: 50
                  description: Title of the knowledge item
                description:
                  type: string
                  maxLength: 200
                  description: Description of the knowledge item
                source_type:
                  type: string
                  enum: [document, url, text]
                  description: Type of knowledge source
                url:
                  type: string
                  description: Required when source_type is url
                raw_text:
                  type: string
                  maxLength: 10000
                  description: Required when source_type is text
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - description
                - source_type
                - document
              properties:
                title:
                  type: string
                  maxLength: 50
                description:
                  type: string
                  maxLength: 200
                source_type:
                  type: string
                  enum: [document]
                document:
                  type: string
                  format: binary
                  description: PDF file, max 25MB
      responses:
        '201':
          description: Knowledge item created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                  message:
                    type: string
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /knowledge_items/{uuid}:
    get:
      tags:
        - Agent Knowledge Base
