      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - voice_uuid
              properties:
                name:
                  type: string
                voice_uuid:
                  type: string
                phone_number_id:
                  type: integer
                languages:
                  type: array
                  items:
                    type: string
                  default: ["en-US"]
                dynamic_variables:
                  type: object
                  additionalProperties:
                    oneOf:
                      - type: string
                      - type: number
                      - type: boolean
                asr:
                  type: object
                  properties:
                    model:
                      type: string
                    provider:
                      type: string
                      default: "deepgram"
                    user_input_audio_format:
                      type: string
                      enum: [pcm_8000, pcm_16000, pcm_22050, pcm_24000, pcm_44100, pcm_48000, ulaw_8000]
                      default: "pcm_16000"
                    keywords:
                      type: array
                      items:
                        type: string
                turn:
                  type: object
                  properties:
                    turn_timeout:
                      type: integer
                      minimum: 0
                      default: 7
                    silence_end_call_timeout:
                      type: integer
                      minimum: -1
                      default: -1
                    mode:
                      type: string
                      enum: [silence]
                      default: "silence"
                llm:
                  type: object
                  properties:
                    prompt:
                      type: string
                    provider:
                      type: string
                    model:
                      type: string
                    reasoning_effort:
                      type: string
                      nullable: true
                    temperature:
                      type: number
                      format: float
                      default: 0.3
                    timezone:
                      type: string
                      nullable: true
                    built_in_tools:
                      type: object
                search_mode:
                  type: string
                  enum: [speed, accuracy]
                  default: "accuracy"
                  description: RAG search strategy - speed (faster) or accuracy (more thorough)
                max_chunks_per_query:
                  type: integer
                  minimum: 1
                  default: 8
                  description: Number of relevant chunks to retrieve per query for RAG
                webhooks:
                  type: array
                  items:
                    type: object
                system_tools:
                  type: object
      responses:
        '200':
          description: Agent created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                  message:
                    type: string
        '400':
