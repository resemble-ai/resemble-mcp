                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                        format: uuid
                      title:
                        type: string
                      description:
                        type: string
                      source_type:
                        type: string
                        enum: [document, url, text]
                      status:
                        type: string
                        enum: [pending, processing, ready, failed]
                      error_message:
                        type: string
                        nullable: true
                      chunk_count:
                        type: integer
                        nullable: true
                      url:
                        type: string
                        nullable: true
                      document_url:
                        type: string
                        nullable: true
                      document_filename:
                        type: string
                        nullable: true
                      agents:
                        type: array
                        items:
