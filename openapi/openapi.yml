  /detect:
    get:
      tags:
        - Deepfake Detection
      summary: List all detects
      description: Retrieve a paginated list of all detect objects for the authenticated user's team
      operationId: listDetections
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: Page number (must be >= 1)
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 10
            maximum: 1000
            default: 10
          description: Number of items per page (10-1000)
      responses:
        '200':
          description: List of detects
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  page:
                    type: integer
                  num_pages:
                    type: integer
                  page_size:
                    type: integer
                  total_count:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        uuid:
                          type: string
                        media_type:
                          type: string
                          enum: [audio, video, image]
                        status:
                          type: string
                          enum: [processing, completed, failed]
                        metrics:
                          $ref: '#/components/schemas/DetectAudioMetrics'
                        image_metrics:
                          $ref: '#/components/schemas/DetectImageMetrics'
                        video_metrics:
                          $ref: '#/components/schemas/DetectVideoMetrics'
                        audio_source_tracing:
                          type: object
                          nullable: true
                          description: Source tracing results (only returned if audio is labeled fake)
                          properties:
                            label:
                              type: string
                              description: Identified source (e.g., resemble_ai, elevenlabs) or "real" if audio is not synthetic
                            error_message:
                              type: string
                              nullable: true
                        intelligence:
                          type: object
                          nullable: true
                        url:
                          type: string
                          nullable: true
                          description: URL to the media file. Null when Zero Retention Mode is enabled.
                        audio_url:
                          type: string
                          nullable: true
                          description: Alias of url. Null when Zero Retention Mode is enabled.
                        filename:
                          type: string
                          description: Original filename, or tokenized (redacted_<token>.<ext>) when Zero Retention Mode is enabled
                        duration:
                          type: number
                        zero_retention_mode:
                          type: boolean
                          description: Whether Zero Retention Mode was enabled for this detect
                        media_redacted:
                          type: boolean
                          description: True when Zero Retention Mode is active and media URLs are redacted
                        media_deleted:
                          type: boolean
                          description: True when the source file has been permanently deleted from storage
                        file_deleted_at:
                          type: string
                          format: date-time
                          nullable: true
                          description: ISO 8601 timestamp of when the file was purged, or null if not yet deleted
                        visualize:
                          type: boolean
                        audio_source_tracing_enabled:
                          type: boolean
                        use_ood_detector:
                          type: boolean
                        pipeline:
                          type: string
                          nullable: true
                          deprecated: true
                          description: Legacy field. May be present on older image/video detects. Ignored on create for new detections.
                        extra_params:
                          type: object
                        error_message:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time

    post:
      tags:
        - Deepfake Detection
      summary: Create deepfake detection
      description: Analyze audio, image, and video for deepfake detection
      operationId: createDetection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  description: HTTPS URL to audio, image, or video file
                callback_url:
                  type: string
                  format: uri
                  description: POST destination when analysis completes
                visualize:
                  type: boolean
                  description: Generate visualization artifacts
                frame_length:
                  type: integer
                  minimum: 1
                  maximum: 4
                  default: 2
                  description: Window size in seconds (audio/video)
                start_region:
                  type: number
                  description: Start of segment to analyze (seconds)
                end_region:
                  type: number
                  description: End of segment to analyze (seconds)
                max_video_fps:
                  type: number
                  description: Downsample high-frame-rate media
                max_video_secs:
                  type: number
                  description: Cap processed duration
                model_types:
                  type: string
                  enum: [image, talking_head]
                  description: Use talking_head for face-swaps
                intelligence:
                  type: boolean
                  default: false
                  description: Run multimodal intelligence analysis on the media
                audio_source_tracing:
                  type: boolean
                  default: false
                  description: Enable audio source tracing to identify synthetic audio origin
                use_reverse_search:
                  type: boolean
                  default: false
                  description: Enable reverse image search to improve detection accuracy for image files. Searches the web for matching images and uses AI to classify whether the match indicates a known fake. Only applies to image detections.
                use_ood_detector:
                  type: boolean
                  default: false
                  description: Enable out-of-distribution detection
                zero_retention_mode:
                  type: boolean
                  default: false
                  description: Enable Zero Retention Mode to automatically delete submitted media after detection completes. When enabled, media URLs are redacted and the filename is tokenized.
      responses:
        '200':
          description: Detection job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                      status:
                        type: string
                      zero_retention_mode:
                        type: boolean
                        description: Whether Zero Retention Mode is enabled for this detect
                      media_redacted:
                        type: boolean
                        description: True when Zero Retention Mode is active and media URLs are redacted
                      media_deleted:
                        type: boolean
                        description: True when the source file has been permanently deleted from storage
                      file_deleted_at:
                        type: string
                        format: date-time
                        nullable: true
                        description: ISO 8601 timestamp of when the file was purged, or null if not yet deleted
                      url:
                        type: string
                        nullable: true
                        description: URL to the media file. Null when Zero Retention Mode is enabled.
                      audio_url:
                        type: string
                        nullable: true
                        description: Alias of url. Null when Zero Retention Mode is enabled.
                      filename:
                        type: string
                        description: Original filename, or tokenized (redacted_<token>.<ext>) when Zero Retention Modeon Modeon Mode is enabled
                      intelligence:
                        type: object
                        nullable: true
                        description: Intelligence results when requested
                        properties:
                          description:
                            oneOf:
                              - type: string
                              - type: object
                          created_at:
                            type: string
                            format: date-time

