      description: Poll this endpoint to check the status of an enhancement job and retrieve the download URL when complete.
      operationId: getAudioEnhancement
      parameters:
        - name: enhancement_uuid
          in: path
          required: true
          schema:
            type: string
          description: The UUID returned from the create endpoint.
      responses:
        '200':
          description: Enhancement details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  uuid:
                    type: string
                  status:
                    type: string
                    enum: [pending, processing, completed, failed]
                  enhanced_audio_url:
                    type: string
                    format: uri
                    nullable: true
                    description: Download URL. Only present when status is completed. This is a temporary signed URL.
                  error_message:
                    type: string
                    nullable: true
                    description: Human-readable error. Only present when status is failed.
        '404':
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Audio enhancement not found or not accessible"

