                  description: Optional project UUID to store the clip
                precision:
                  type: string
                  enum: [MULAW, PCM_16, PCM_24, PCM_32]
                  default: PCM_32
                  description: Audio precision
                sample_rate:
                  type: integer
                  enum: [8000, 16000, 22050, 32000, 44100, 48000]
                  default: 48000
                  description: Audio sample rate in Hz
                use_hd:
                  type: boolean
                  default: false
                  description: Enable HD synthesis with small latency trade-off
      responses:
        '200':
          description: Streaming audio response (chunked WAV)
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /duet_voices:
    get:
      tags:
        - Duets
      summary: List duet voices
      description: Returns default and custom duet voices
      operationId: listDuetVoices
      responses:
        '200':
          description: List of duet voices
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  items:
                    type: array
                    items:
                      type: object

    post:
      tags:
        - Duets
      summary: Create custom duet voice
      description: Create a custom voice for duet generation
      operationId: createDuetVoice
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - audio
              properties:
                name:
                  type: string
                  description: Voice name
                style_prompt:
                  type: string
                  description: Optional style prompt
                audio:
                  type: string
                  format: binary
                  description: Audio file (MP3/WAV/M4A/OGG/AAC/FLAC max 10 MB)
      responses:
        '200':
          description: Duet voice created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object

  /duet_voices/{id}:
    put:
      tags:
        - Duets
      summary: Update duet voice
      description: Update a custom duet voice (default voices cannot be modified)
      operationId: updateDuetVoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                style_prompt:
                  type: string
      responses:
        '200':
          description: Duet voice updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object

    delete:
      tags:
        - Duets
      summary: Delete duet voice
      description: Delete a custom duet voice (default voices cannot be deleted)
      operationId: deleteDuetVoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Duet voice deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /duet_voice_pairs:
    get:
      tags:
        - Duets
      summary: List duet voice pairs
      description: List all voice pairs for duet generation
      operationId: listDuetVoicePairs
      responses:
        '200':
          description: List of voice pairs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  items:
                    type: array
                    items:
                      type: object

    post:
      tags:
        - Duets
      summary: Create duet voice pair
      description: Create a voice pair for duet generation
      operationId: createDuetVoicePair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - voice_1_id
                - voice_2_id
              properties:
                voice_1_id:
                  type: integer
                  description: ID of first voice
                voice_2_id:
                  type: integer
                  description: ID of second voice
                name:
                  type: string
                  description: Optional pair name
      responses:
        '200':
          description: Voice pair created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object

  /duet:
    post:
      tags:
        - Duets
      summary: Generate duet
      description: Generate conversational audio with two speakers
      operationId: generateDuet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - voice_pair_id
                - script
              properties:
                voice_pair_id:
                  type: integer
                  description: Voice pair ID to use
                script:
                  type: array
                  items:
                    type: object
                    required:
                      - speaker
                      - text
                    properties:
                      speaker:
                        type: integer
                        enum: [0, 1]
                        description: Speaker index (0 or 1)
                      text:
                        type: string
                        description: Text for this speaker
                title:
                  type: string
                  description: Optional title for the duet
                callback_uri:
                  type: string
                  format: uri
                  description: Webhook URL for completion notification
      responses:
        '200':
          description: Duet generation job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                      status:
                        type: string

