openapi: 3.0.3
info:
  title: Resemble AI API
  description: |
    Resemble AI provides a comprehensive platform for voice generation, real-time agents, safety & detection, and voice management.
    
    ## Authentication
    All API requests require Bearer token authentication using your API key.
    Get your API key from https://app.resemble.ai/account/api
    
    ## Base URLs
    - Main API: `https://app.resemble.ai/api/v2`
    - Synthesis API: `https://f.cluster.resemble.ai`
    - WebSocket Streaming: `wss://websocket.cluster.resemble.ai`
  version: 2.0.0
  contact:
    name: Resemble AI Support
    url: https://www.resemble.ai
    email: support@resemble.ai

servers:
  - url: https://app.resemble.ai/api/v2
    description: Main API Server
    x-fern-server-name: production

security:
  - BearerAuth: []

tags:
  - name: Text-to-Speech
    description: Generate speech from text or SSML
  - name: Speech-to-Speech
    description: Convert donor recordings to target voices
  - name: Speech-to-Text
    description: Transcribe audio and video files
  - name: Audio Edit
    description: Edit audio segments using voice synthesis
  - name: Audio Enhancement
    description: Enhance audio quality
  - name: Agents
    description: Manage real-time voice agents
  - name: Agent Tools
    description: Manage agent tools and capabilities
  - name: Agent Webhooks
    description: Manage agent webhooks for pre-call and post-call integrations
  - name: Agent Phone Numbers
    description: Manage phone numbers for agents
  - name: Agent Knowledge Base
    description: Manage knowledge items and RAG support for agents
  - name: Deepfake Detection
    description: Deepfake detection
  - name: Intelligence
    description: Analyze audio, image, and video for insights
  - name: Identity
    description: Identity management for speaker verification
  - name: Watermark
    description: Apply and detect audio watermarks
  - name: Voices
    description: Manage and create voices
  - name: Voice Design
    description: Generate voices from text prompts
  - name: Recordings
    description: Manage voice training recordings
  - name: Projects
    description: Manage projects and organize clips
  - name: Clips
    description: Manage generated audio clips
  - name: Term Substitutions
    description: Manage pronunciation substitutions
  - name: Voice Settings Presets
    description: Manage voice configuration presets
  - name: Account
    description: Account and billing information
  - name: Duets
    description: Generate conversational audio with two speakers

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: API token from https://app.resemble.ai/account/api

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Error message"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        message:
          type: string

    AudioTimestamps:
      type: object
      properties:
        graph_chars:
          type: array
          items:
            type: string
          description: Grapheme characters
        graph_times:
          type: array
          items:
            type: array
            items:
              type: number
          description: Grapheme timestamps [start, end] in seconds
        phon_chars:
          type: array
          items:
            type: string
          description: Phoneme characters
        phon_times:
          type: array
          items:
            type: array
            items:
              type: number
          description: Phoneme timestamps [start, end] in seconds

paths:
  /synthesize:
    post:
      tags:
        - Text-to-Speech
      summary: Synchronous text-to-speech synthesis
      description: Generate speech synchronously from text or SSML. Returns complete audio as base64.
      operationId: synthesize
      servers:
        - url: https://f.cluster.resemble.ai
          x-fern-server-name: synthesis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - voice_uuid
                - data
              properties:
                voice_uuid:
                  type: string
                  description: Voice UUID to use for synthesis
                  example: "55592656"
                project_uuid:
                  type: string
                  description: Optional project UUID to store the clip
                title:
                  type: string
                  description: Optional title for the generated clip
                data:
                  type: string
                  description: Text or SSML to synthesize (max 3,000 characters)
                  example: "Hello from Resemble!"
                precision:
                  type: string
                  enum: [MULAW, PCM_16, PCM_24, PCM_32]
                  default: PCM_32
                  description: Audio precision for WAV output
                output_format:
                  type: string
                  enum: [wav, mp3]
                  default: wav
                  description: Audio output format
                sample_rate:
                  type: integer
                  enum: [8000, 16000, 22050, 32000, 44100, 48000]
                  default: 22050
                  description: Audio sample rate in Hz
      responses:
        '200':
          description: Successful synthesis
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  audio_content:
                    type: string
                    format: byte
                    description: Base64-encoded audio bytes
                  audio_timestamps:
                    $ref: '#/components/schemas/AudioTimestamps'
                  duration:
                    type: number
                    format: float
                    description: Audio duration in seconds
                  synth_duration:
                    type: number
                    format: float
                    description: Raw synthesis time
                  output_format:
                    type: string
                    example: "wav"
                  sample_rate:
                    type: integer
                    example: 48000
                  title:
                    type: string
                  issues:
                    type: array
                    items:
                      type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /speech-to-text:
    post:
      tags:
        - Speech-to-Text
      summary: Create transcript job
      description: Submit audio or video for transcription
      operationId: createTranscript
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio or video file (max 500 MB, 20 minutes)
                query:
                  type: string
                  description: Optional intelligence question to evaluate after transcription
          application/json:
            schema:
              type: object
              properties:
                audio_token:
                  type: string
                  description: Signed ActiveStorage token
                url:
                  type: string
                  format: uri
                  description: HTTPS URL to audio/video file
                query:
                  type: string
                  description: Optional intelligence question
      responses:
        '200':
          description: Transcript job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [pending, processing, completed, failed]
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    get:
      tags:
        - Speech-to-Text
      summary: List transcripts
      description: Retrieve paginated list of transcript jobs
      operationId: listTranscripts
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 25
      responses:
        '200':
          description: List of transcripts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        uuid:
                          type: string
                          format: uuid
                        status:
                          type: string
                        duration_seconds:
                          type: number
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      per_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_items:
                        type: integer

  /speech-to-text/{uuid}:
    get:
      tags:
        - Speech-to-Text
      summary: Get transcript
      description: Retrieve transcript status, text, and timestamps
      operationId: getTranscript
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transcript details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [pending, processing, completed, failed]
                      text:
                        type: string
                      words:
                        type: array
                        items:
                          type: object
                          properties:
                            text:
                              type: string
                            start_time:
                              type: number
                            end_time:
                              type: number
                            speaker_id:
                              type: string
                      duration_seconds:
                        type: number
                      file_url:
                        type: string
                        format: uri
                      query:
                        type: string
                      answer:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time

  /speech-to-text/{uuid}/ask:
    post:
      tags:
        - Speech-to-Text
      summary: Ask intelligence question
      description: Submit a question about a completed transcript
      operationId: askTranscriptQuestion
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Question to ask about the transcript
                  example: "What action items were mentioned?"
      responses:
        '200':
          description: Question submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                        format: uuid
                      transcript_uuid:
                        type: string
                        format: uuid
                      query:
                        type: string
                      status:
                        type: string
                      created_at:
                        type: string
                        format: date-time

  /speech-to-text/{uuid}/questions:
    get:
      tags:
        - Speech-to-Text
      summary: List intelligence questions
      description: List all questions asked about a transcript
      operationId: listTranscriptQuestions
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
            maximum: 50
      responses:
        '200':
          description: List of questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        uuid:
                          type: string
                          format: uuid
                        query:
                          type: string
                        answer:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    type: object

  /speech-to-text/{uuid}/questions/{question_uuid}:
    get:
      tags:
        - Speech-to-Text
      summary: Get intelligence question status
      description: Check the status of a specific question
      operationId: getTranscriptQuestion
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: question_uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Question details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                        format: uuid
                      transcript_uuid:
                        type: string
                        format: uuid
                      query:
                        type: string
                      answer:
                        type: string
                      status:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time

  /edit:
    post:
      tags:
        - Audio Edit
      summary: Create audio edit
      description: Edit audio segments using voice synthesis
      operationId: createAudioEdit
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - input_audio
                - original_transcript
                - target_transcript
                - voice_uuid
              properties:
                input_audio:
                  type: string
                  format: binary
                  description: WAV, MP3, M4A, or WMA file (< 20 seconds)
                original_transcript:
                  type: string
                  description: Accurate transcript of the uploaded audio
                target_transcript:
                  type: string
                  description: Desired replacement text
                voice_uuid:
                  type: string
                  description: Voice used to render the edited segment
      responses:
        '200':
          description: Edit job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                      voice_uuid:
                        type: string
                      original_transcript:
                        type: string
                      target_transcript:
                        type: string
                      input_audio_url:
                        type: string
                        format: uri
    
    get:
      tags:
        - Audio Edit
      summary: List audio edits
      description: Retrieve paginated list of audio edits
      operationId: listAudioEdits
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: List of audio edits
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  page:
                    type: integer
                  num_pages:
                    type: integer
                  page_size:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object

  /edit/{audio_edit_uuid}:
    get:
      tags:
        - Audio Edit
      summary: Get audio edit
      description: Get status and result of an audio edit
      operationId: getAudioEdit
      parameters:
        - name: audio_edit_uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audio edit details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                      voice_uuid:
                        type: string
                      original_transcript:
                        type: string
                      target_transcript:
                        type: string
                      input_audio_url:
                        type: string
                        format: uri
                      result_audio_url:
                        type: string
                        format: uri

  /audio_enhancements:
    post:
      tags:
        - Audio Enhancement
      summary: Create audio enhancement
      description: Enhance audio quality
      operationId: createAudioEnhancement
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - audio_file
              properties:
                audio_file:
                  type: string
                  format: binary
                  description: MP3 or WAV file (max 150 MB)
                enhancement_level:
                  type: number
                  format: float
                  minimum: 0.0
                  maximum: 1.0
                  default: 1.0
                loudness_target_level:
                  type: integer
                  minimum: -70
                  maximum: -5
                  default: -14
                  description: LUFS
                loudness_peak_limit:
                  type: integer
                  minimum: -9
                  maximum: 0
                  default: -1
                  description: dBTP
      responses:
        '200':
          description: Enhancement job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  uuid:
                    type: string
                  status:
                    type: string
    
    get:
      tags:
        - Audio Enhancement
      summary: List audio enhancements
      description: Retrieve paginated list of audio enhancements
      operationId: listAudioEnhancements
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of enhancements
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  page:
                    type: integer
                  num_pages:
                    type: integer
                  page_size:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object

  /audio_enhancements/{enhancement_uuid}:
    get:
      tags:
        - Audio Enhancement
      summary: Get audio enhancement
      description: Get status and result of an audio enhancement
      operationId: getAudioEnhancement
      parameters:
        - name: enhancement_uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Enhancement details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  uuid:
                    type: string
                  status:
                    type: string
                    enum: [processing, completed, failed]
                  enhanced_audio_url:
                    type: string
                    format: uri
                  error_message:
                    type: string
                    nullable: true

  /agents:
    get:
      tags:
        - Agents
      summary: List agents
      description: Retrieve all agents for the authenticated team
      operationId: listAgents
      parameters:
        - name: phone_number
          in: query
          schema:
            type: string
          description: Filter by associated phone number
        - name: advanced
          in: query
          schema:
            type: boolean
            default: false
          description: Include detailed configuration
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  items:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer
    
    post:
      tags:
        - Agents
      summary: Create agent
      description: Create a new voice agent
      operationId: createAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - voice_uuid
              properties:
                name:
                  type: string
                voice_uuid:
                  type: string
                phone_number_id:
                  type: integer
                languages:
                  type: array
                  items:
                    type: string
                  default: ["en-US"]
                dynamic_variables:
                  type: object
                  additionalProperties:
                    oneOf:
                      - type: string
                      - type: number
                      - type: boolean
                asr:
                  type: object
                  properties:
                    model:
                      type: string
                    provider:
                      type: string
                      default: "deepgram"
                    user_input_audio_format:
                      type: string
                      enum: [pcm_8000, pcm_16000, pcm_22050, pcm_24000, pcm_44100, pcm_48000, ulaw_8000]
                      default: "pcm_16000"
                    keywords:
                      type: array
                      items:
                        type: string
                turn:
                  type: object
                  properties:
                    turn_timeout:
                      type: integer
                      minimum: 0
                      default: 7
                    silence_end_call_timeout:
                      type: integer
                      minimum: -1
                      default: -1
                    mode:
                      type: string
                      enum: [silence]
                      default: "silence"
                llm:
                  type: object
                  properties:
                    prompt:
                      type: string
                    provider:
                      type: string
                    model:
                      type: string
                    reasoning_effort:
                      type: string
                      nullable: true
                    temperature:
                      type: number
                      format: float
                      default: 0.3
                    timezone:
                      type: string
                      nullable: true
                    built_in_tools:
                      type: object
                search_mode:
                  type: string
                  enum: [speed, accuracy]
                  default: "accuracy"
                  description: RAG search strategy - speed (faster) or accuracy (more thorough)
                max_chunks_per_query:
                  type: integer
                  minimum: 1
                  default: 8
                  description: Number of relevant chunks to retrieve per query for RAG
                webhooks:
                  type: array
                  items:
                    type: object
                system_tools:
                  type: object
      responses:
        '200':
          description: Agent created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                  message:
                    type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agents/{uuid}:
    get:
      tags:
        - Agents
      summary: Get agent
      description: Retrieve a specific agent's details
      operationId: getAgent
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: advanced
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
    
    patch:
      tags:
        - Agents
      summary: Update agent
      description: Update an existing agent's configuration
      operationId: updateAgent
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                voice_uuid:
                  type: string
                phone_number_id:
                  type: integer
                languages:
                  type: array
                  items:
                    type: string
                dynamic_variables:
                  type: object
                asr:
                  type: object
                turn:
                  type: object
                llm:
                  type: object
                search_mode:
                  type: string
                  enum: [speed, accuracy]
                  description: RAG search strategy
                max_chunks_per_query:
                  type: integer
                  minimum: 1
                  description: Number of chunks to retrieve per query for RAG
                webhooks:
                  type: array
                system_tools:
                  type: object
      responses:
        '200':
          description: Agent updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                  message:
                    type: string
    
    delete:
      tags:
        - Agents
      summary: Delete agent
      description: Delete an agent and all its configurations
      operationId: deleteAgent
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Agent deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /agents/{uuid}/dispatch:
    post:
      tags:
        - Agents
      summary: Dispatch agent
      description: Make an outbound call with an agent
      operationId: dispatchAgent
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone_number
              properties:
                phone_number:
                  type: string
                  description: Destination phone number
                dynamic_variables:
                  type: object
                  description: Runtime variable overrides
      responses:
        '200':
          description: Call dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  call_id:
                    type: string

  /agents/capabilities:
    get:
      tags:
        - Agents
      summary: Get capabilities
      description: List supported ASR and LLM providers and models
      operationId: getAgentCapabilities
      responses:
        '200':
          description: Agent capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  asr_capabilities:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                          description: ASR provider name (e.g., "deepgram")
                        model:
                          type: string
