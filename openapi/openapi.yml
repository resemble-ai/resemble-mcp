      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Apply result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                      media_type:
                        type: string
                        enum:
                          - audio
                          - image
                          - video
                      source_media_url:
                        type: string
                        format: uri
                      watermarked_media:
                        type: string
                        format: uri
                        nullable: true
                        description: Signed URL to the watermarked file. Null while processing.
                      metrics:
                        type: object
                        nullable: true
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time

  /watermark/detect:
    post:
      tags:
        - Watermark
      summary: Detect watermark
      description: "Detect a watermark in an audio, image, or video file. The media type is automatically detected from the file content. Use the `Prefer: wait` header for synchronous processing."
      operationId: detectWatermark
      parameters:
        - name: Prefer
          in: header
          required: false
          schema:
            type: string
            enum:
              - wait
          description: When set to "wait", the API processes synchronously and returns the completed result with metrics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
