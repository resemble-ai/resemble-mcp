            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    $ref: '#/components/schemas/CustomPronunciation'

    delete:
      tags:
        - Custom Pronunciations
      summary: Delete custom pronunciation
