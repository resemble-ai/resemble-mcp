      responses:
        '200':
          description: Detection job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                      media_type:
                        type: string
                        enum:
                          - audio
                          - image
                          - video
                      source_media_url:
                        type: string
                        format: uri
                      metrics:
                        type: object
                        nullable: true
                        description: Detection results. Null while processing.
                      watermarked_media:
                        type: string
                        nullable: true
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time

  /watermark/detect/{uuid}/result:
    get:
