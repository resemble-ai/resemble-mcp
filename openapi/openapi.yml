openapi: 3.0.3
info:
  title: Resemble AI API
  description: |
    Resemble AI provides a comprehensive platform for voice generation, real-time agents, safety & detection, and voice management.
    
    ## Authentication
    All API requests require Bearer token authentication using your API key.
    Get your API key from https://app.resemble.ai/account/api
    
    ## Base URLs
    - Main API: `https://app.resemble.ai/api/v2`
    - Synthesis API: `https://f.cluster.resemble.ai`
    - WebSocket Streaming: `wss://websocket.cluster.resemble.ai`
  version: 2.0.0
  contact:
    name: Resemble AI Support
    url: https://www.resemble.ai
    email: support@resemble.ai

servers:
  - url: https://app.resemble.ai/api/v2
    description: Main API Server
    x-fern-server-name: production

security:
  - BearerAuth: []

tags:
  - name: Text-to-Speech
    description: Generate speech from text or SSML
  - name: Speech-to-Speech
    description: Convert donor recordings to target voices
  - name: Speech-to-Text
    description: Transcribe audio and video files
  - name: Audio Edit
    description: Edit audio segments using voice synthesis
  - name: Audio Enhancement
    description: Enhance audio quality
  - name: Agents
    description: Manage real-time voice agents
  - name: Agent Tools
    description: Manage agent tools and capabilities
  - name: Agent Webhooks
    description: Manage agent webhooks for pre-call and post-call integrations
  - name: Agent Phone Numbers
    description: Manage phone numbers for agents
  - name: Agent Knowledge Base
    description: Manage knowledge items and RAG support for agents
  - name: Deepfake Detection
    description: Deepfake detection
  - name: Audio Source Tracing
    description: Identify the origin of synthetic audio
  - name: Intelligence
    description: Analyze audio, image, and video for insights
  - name: Detect Intelligence
    description: Ask natural-language questions about completed detection reports
  - name: Identity
    description: Identity management for speaker verification
  - name: Watermark
    description: Apply and detect watermarks on audio, image, and video files
  - name: Voices
    description: Manage and create voices
  - name: Voice Design
    description: Generate voices from text prompts
  - name: Recordings
    description: Manage voice training recordings
  - name: Projects
    description: Manage projects and organize clips
  - name: Clips
    description: Manage generated audio clips
  - name: Term Substitutions
    description: Manage pronunciation substitutions
  - name: Custom Pronunciations
    description: Manage custom word pronunciations with reference audio
  - name: Voice Settings Presets
    description: Manage voice configuration presets
  - name: Account
    description: Account and billing information
  - name: Duets
    description: Generate conversational audio with two speakers

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: API token from https://app.resemble.ai/account/api

  schemas:
    CustomPronunciation:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          description: Unique identifier for the pronunciation
        word:
          type: string
          description: The word or phrase this pronunciation applies to
          example: "mounjaro"
        status:
          type: string
          enum: [pending, ready, failed]
          description: Processing status. Only "ready" pronunciations are applied during synthesis.
          example: "ready"
        active:
          type: boolean
          description: Whether this pronunciation is active and will be applied during synthesis
          example: true
        audio_url:
          type: string
          format: uri
          description: URL to the uploaded reference audio
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Error message"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        message:
          type: string

    AudioTimestamps:
      type: object
      properties:
        graph_chars:
          type: array
          items:
            type: string
          description: Grapheme characters
        graph_times:
          type: array
          items:
            type: array
            items:
              type: number
          description: Grapheme timestamps [start, end] in seconds
        phon_chars:
          type: array
          items:
            type: string
          description: Phoneme characters
        phon_times:
          type: array
          items:
            type: array
            items:
              type: number
          description: Phoneme timestamps [start, end] in seconds

    DetectAudioMetrics:
      type: object
      nullable: true
      description: Audio detection metrics (for audio and video media types)
      required:
        - label
        - score
        - consistency
        - aggregated_score
      properties:
        label:
          type: string
          description: Detection label (fake or real)
          example: "fake"
        score:
          type: array
          items:
            type: string
          description: Array of prediction scores per chunk
          example: ["0.9", "0.8", "0.7"]
        consistency:
          type: string
          description: Consistency metric across chunks
          example: "0.85"
        aggregated_score:
          type: string
          description: Overall aggregated detection score
          example: "0.566"
        image:
          type: string
          description: URL to visualization heatmap image (if visualize=true)
          example: "https://storage.example.com/heatmap.png"

    DetectImageMetrics:
      type: object
      nullable: true
      description: Image detection metrics (for image media type)
      required:
        - type
        - label
        - image
        - score
        - children
      properties:
        type:
          type: string
          description: Type of image analysis performed
          example: "facial"
        label:
          type: string
          description: Detection label (fake or real)
          example: "fake"
        image:
          type: string
          description: URL to visualization image
          example: "https://storage.example.com/image.png"
        score:
          type: number
          format: float
          description: Detection confidence score
          example: 0.9
        children:
          type: array
          items:
            type: object
          description: Nested analysis results (structure varies by pipeline)

    DetectVideoMetrics:
      type: object
      nullable: true
      description: Video detection metrics (for video media type)
      required:
        - label
        - score
        - certainty
        - children
      properties:
        label:
          type: string
          description: Overall video detection label
          example: "Fake"
        score:
          type: number
          format: float
          description: Overall detection score
          example: 0.9
        certainty:
          type: number
          format: float
          description: Overall certainty score
          example: 0.9
        treeview:
          type: string
          description: Optional tree visualization data
        children:
          type: array
          description: Hierarchical detection results across frames
          items:
            type: object
            required:
              - type
              - conclusion
              - score
              - certainty
              - "certainty (%)"
              - children
            properties:
              type:
                type: string
                example: "VideoResult"
              conclusion:
                type: string
                example: "Fake"
              score:
                type: number
                format: float
                example: 0.99
              certainty:
                type: number
                format: float
                example: 0.9
              "certainty (%)":
                type: string
                example: "90%"
              children:
                type: array
                description: Frame-level detection results
                items:
                  type: object
                  required:
                    - type
                    - conclusion
                    - score
                    - certainty
                    - "certainty (%)"
                    - timestamp
                    - children
                  properties:
                    type:
                      type: string
                      example: "ImageResult"
                    conclusion:
                      type: string
                      example: "Fake"
                    score:
                      type: number
                      format: float
                      example: 0.9
                    certainty:
                      type: number
                      format: float
                      example: 0.95
                    "certainty (%)":
                      type: string
                      example: "95%"
                    timestamp:
                      type: number
                      format: float
                      description: Timestamp in seconds
                      example: 0.23
                    children:
                      type: array
                      description: Segment-level detection results
                      items:
                        type: object
                        required:
                          - type
                          - conclusion
                          - score
                          - certainty
                          - "certainty (%)"
                        properties:
                          type:
                            type: string
                            example: "Segment"
                          conclusion:
                            type: string
                            example: "Fake"
                          score:
                            type: number
                            format: float
                            example: 0.9
                          certainty:
                            type: number
                            format: float
                            example: 0.995
                          "certainty (%)":
                            type: string
                            example: "99.5%"

paths:
  /synthesize:
    post:
      tags:
        - Text-to-Speech
      summary: Synchronous text-to-speech synthesis
      description: Generate speech synchronously from text or SSML. Returns complete audio as base64.
      operationId: synthesize
      servers:
        - url: https://f.cluster.resemble.ai
          x-fern-server-name: synthesis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - voice_uuid
                - data
              properties:
                voice_uuid:
                  type: string
                  description: Voice UUID to use for synthesis
                  example: "55592656"
                project_uuid:
                  type: string
                  description: Optional project UUID to store the clip
                title:
                  type: string
                  description: Optional title for the generated clip
                data:
                  type: string
                  description: Text or SSML to synthesize (max 3,000 characters)
                  example: "Hello from Resemble!"
                model:
                  type: string
                  description: Model to use for synthesis. Pass `chatterbox-turbo` to use the Turbo model for lower latency and paralinguistic tag support. If not specified, defaults to Chatterbox or Chatterbox Multilingual based on the voice. Note - Chatterbox-Turbo is supported by all Rapid English voices and Pre Built Library voices.
                  example: "chatterbox-turbo"
                precision:
                  type: string
                  enum: [MULAW, PCM_16, PCM_24, PCM_32]
                  default: PCM_32
                  description: Audio precision for WAV output
                output_format:
                  type: string
                  enum: [wav, mp3]
                  default: wav
                  description: Audio output format
                sample_rate:
                  type: integer
                  enum: [8000, 16000, 22050, 32000, 44100, 48000]
                  default: 22050
                  description: Audio sample rate in Hz
                use_hd:
                  type: boolean
                  default: false
                  description: Enable HD synthesis with small latency trade-off
                apply_custom_pronunciations:
                  type: boolean
                  default: false
                  description: When true, automatically applies your team's custom pronunciations to matching words in the input text. Defaults to false.
      responses:
        '200':
          description: Successful synthesis
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  audio_content:
                    type: string
                    format: byte
                    description: Base64-encoded audio bytes
                  audio_timestamps:
                    $ref: '#/components/schemas/AudioTimestamps'
                  duration:
                    type: number
                    format: float
                    description: Audio duration in seconds
                  synth_duration:
                    type: number
                    format: float
                    description: Raw synthesis time
                  output_format:
                    type: string
                    example: "wav"
                  sample_rate:
                    type: integer
                    example: 48000
                  title:
                    type: string
                  issues:
                    type: array
                    items:
                      type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /speech-to-text:
    post:
      tags:
        - Speech-to-Text
      summary: Create transcript job
      description: Submit audio or video for transcription
      operationId: createTranscript
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio or video file (max 500 MB, 20 minutes)
                query:
                  type: string
                  description: Optional intelligence question to evaluate after transcription
          application/json:
            schema:
              type: object
              properties:
                audio_token:
                  type: string
                  description: Signed ActiveStorage token
                url:
                  type: string
                  format: uri
                  description: HTTPS URL to audio/video file
                query:
                  type: string
                  description: Optional intelligence question
      responses:
        '200':
          description: Transcript job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [pending, processing, completed, failed]
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    get:
      tags:
        - Speech-to-Text
      summary: List transcripts
      description: Retrieve paginated list of transcript jobs
      operationId: listTranscripts
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 25
      responses:
        '200':
          description: List of transcripts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        uuid:
                          type: string
                          format: uuid
                        status:
                          type: string
                        duration_seconds:
                          type: number
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      per_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_items:
                        type: integer

  /speech-to-text/{uuid}:
    get:
      tags:
        - Speech-to-Text
      summary: Get transcript
      description: Retrieve transcript status, text, and timestamps
      operationId: getTranscript
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transcript details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [pending, processing, completed, failed]
                      text:
                        type: string
                      words:
                        type: array
                        items:
                          type: object
                          properties:
                            text:
                              type: string
                            start_time:
                              type: number
                            end_time:
                              type: number
                            speaker_id:
                              type: string
                      duration_seconds:
                        type: number
                      file_url:
                        type: string
                        format: uri
                      query:
                        type: string
                      answer:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time

  /speech-to-text/{uuid}/ask:
    post:
      tags:
        - Speech-to-Text
      summary: Ask intelligence question
      description: Submit a question about a completed transcript
      operationId: askTranscriptQuestion
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Question to ask about the transcript
                  example: "What action items were mentioned?"
      responses:
        '200':
          description: Question submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                        format: uuid
                      transcript_uuid:
                        type: string
                        format: uuid
                      query:
                        type: string
                      status:
                        type: string
                      created_at:
                        type: string
                        format: date-time

  /speech-to-text/{uuid}/questions:
    get:
      tags:
        - Speech-to-Text
      summary: List intelligence questions
      description: List all questions asked about a transcript
      operationId: listTranscriptQuestions
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
            maximum: 50
      responses:
        '200':
          description: List of questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        uuid:
                          type: string
                          format: uuid
                        query:
                          type: string
                        answer:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    type: object

  /speech-to-text/{uuid}/questions/{question_uuid}:
    get:
      tags:
        - Speech-to-Text
      summary: Get intelligence question status
      description: Check the status of a specific question
      operationId: getTranscriptQuestion
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: question_uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Question details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                        format: uuid
                      transcript_uuid:
                        type: string
                        format: uuid
                      query:
                        type: string
                      answer:
                        type: string
                      status:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time

  /edit:
    post:
      tags:
        - Audio Edit
      summary: Create audio edit
      description: Edit audio segments using voice synthesis
      operationId: createAudioEdit
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - input_audio
                - original_transcript
                - target_transcript
                - voice_uuid
              properties:
                input_audio:
                  type: string
                  format: binary
                  description: WAV, MP3, M4A, or WMA file (< 20 seconds)
                original_transcript:
                  type: string
                  description: Accurate transcript of the uploaded audio
                target_transcript:
                  type: string
                  description: Desired replacement text
                voice_uuid:
                  type: string
                  description: Voice used to render the edited segment
      responses:
        '200':
          description: Edit job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                      voice_uuid:
                        type: string
                      original_transcript:
                        type: string
                      target_transcript:
                        type: string
                      input_audio_url:
                        type: string
                        format: uri
    
    get:
      tags:
        - Audio Edit
      summary: List audio edits
      description: Retrieve paginated list of audio edits
      operationId: listAudioEdits
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: List of audio edits
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  page:
                    type: integer
                  num_pages:
                    type: integer
                  page_size:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object

  /edit/{audio_edit_uuid}:
    get:
      tags:
        - Audio Edit
      summary: Get audio edit
      description: Get status and result of an audio edit
      operationId: getAudioEdit
      parameters:
        - name: audio_edit_uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audio edit details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  item:
                    type: object
                    properties:
                      uuid:
                        type: string
                      voice_uuid:
                        type: string
                      original_transcript:
                        type: string
                      target_transcript:
                        type: string
                      input_audio_url:
                        type: string
                        format: uri
                      result_audio_url:
                        type: string
                        format: uri

  /audio_enhancements:
    post:
      tags:
        - Audio Enhancement
      summary: Create audio enhancement
      description: |
        Submit an audio file for enhancement. Processing happens asynchronously in the background.
        The API defaults to the v2 enhancement engine. The v1 engine is legacy and will be sunset in a future release.
      operationId: createAudioEnhancement
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - audio_file
              properties:
                audio_file:
                  type: string
                  format: binary
                  description: Audio file to enhance (WAV, MP3, M4A, MP4, OGG, AAC, FLAC). Max 150 MB.
                enhancement_engine:
                  type: string
                  enum: [v1, v2]
                  default: v2
                  description: Enhancement engine to use. Default is v2.
                remove_noise:
                  type: boolean
                  default: true
                  description: Remove background noise. Engine v2 only.
                normalize:
                  type: boolean
                  default: true
                  description: Normalize audio levels. Engine v2 only.
                studio_sound:
                  type: boolean
                  default: true
                  description: Apply studio-quality enhancement. Engine v2 only.
                enhancement_level:
                  type: number
                  format: float
                  minimum: 0.0
                  maximum: 1.0
                  default: 1.0
                  description: Enhancement intensity (0.0 to 1.0). Engine v1 only (legacy).
                loudness_target_level:
                  type: integer
                  minimum: -70
                  maximum: -5
                  default: -14
                  description: Target loudness in LUFS. Engine v1 only (legacy).
                loudness_peak_limit:
                  type: integer
                  minimum: -9
                  maximum: 0
                  default: -1
                  description: Peak limit in dBTP. Engine v1 only (legacy).
      responses:
        '202':
          description: Enhancement job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  uuid:
                    type: string
                  status:
                    type: string
                    enum: [pending]
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "audio_file parameter is required"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Your plan doesn't support audio enhancements."

    get:
      tags:
        - Audio Enhancement
      summary: List audio enhancements
      description: Returns a paginated list of all audio enhancements for your team, ordered by most recent first.
      operationId: listAudioEnhancements
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: Page number (starting from 1).
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 10
            maximum: 1000
            default: 10
          description: Items per page (10 to 1000). Default 10.
      responses:
        '200':
          description: List of enhancements
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  page:
                    type: integer
                  num_pages:
                    type: integer
                  page_size:
                    type: integer
                  total_count:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        uuid:
                          type: string
                        status:
                          type: string
                          enum: [pending, processing, completed, failed]
                        enhancement_engine:
                          type: string
                          enum: [v1, v2]
                        error_message:
                          type: string
                          nullable: true
                        remove_noise:
                          type: boolean
                          description: Engine v2 only.
                        normalize:
                          type: boolean
                          description: Engine v2 only.
                        studio_sound:
                          type: boolean
                          description: Engine v2 only.
                        loudness_target_level:
                          type: integer
                          description: Engine v1 only.
