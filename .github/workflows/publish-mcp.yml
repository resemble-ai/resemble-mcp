name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for github-oidc auth to the registry
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Validate
        run: mcp-publisher validate

      - name: Login (GitHub OIDC — authenticates the io.github.resemble-ai namespace)
        run: mcp-publisher login github-oidc

      - name: Publish
        run: mcp-publisher publish
